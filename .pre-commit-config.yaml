# Local quality gates. Mirror the CI workflow at .github/workflows/ci.yml.
# Install with: pre-commit install
default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        args: ["--strict"]
        files: ^src/ctrldoc/
        additional_dependencies:
          - pydantic>=2.6
          - tiktoken>=0.7

  - repo: local
    hooks:
      - id: leak-scan
        name: repository content lint
        entry: bash scripts/leak_scan.sh
        language: system
        pass_filenames: false
      - id: context-budget
        name: context budget (STATE/ROADMAP/SPEC_DIGEST caps + shard freshness)
        entry: bash scripts/check-context-budget.sh
        language: system
        pass_filenames: false
      - id: shard-spec
        name: docs/spec/ shards in sync with docs/SPEC.md
        entry: bash scripts/shard-spec.sh --check
        language: system
        pass_filenames: false
        files: '^docs/(SPEC\.md|spec/.*\.md)$'
      - id: shard-decisions
        name: docs/decisions/ shards in sync with docs/DECISIONS.md
        entry: bash scripts/shard-decisions.sh --check
        language: system
        pass_filenames: false
        files: '^docs/(DECISIONS\.md|decisions/.*\.md)$'
